name: AFL Long Run Manager

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build afl++ python3-pip
      - name: List existing corpus
        run: python3 scripts/fuzz/corpus_manager.py list --target secure_ops || true

  build-and-fuzz:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      CC: afl-clang-fast
      CXX: afl-clang-fast++
    steps:
      - uses: actions/checkout@v4
      - name: Configure (AFL compilers)
        run: |
          CC=${CC} CXX=${CXX} cmake -S . -B build-afl -DENABLE_FUZZING=ON -DENABLE_AFL=ON -DCMAKE_BUILD_TYPE=Debug
      - name: Build fuzz target
        run: cmake --build build-afl --target fuzz_secure_ops_afl -j
      - name: Run afl-fuzz (short smoke)
        run: |
          mkdir -p afl_out
          timeout 300s afl-fuzz -i tests/fuzz/corpus/secure_ops -o afl_out -- ./build-afl/fuzz_secure_ops_afl @@ || true

  collect:
    needs: build-and-fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect findings
        run: python3 scripts/fuzz/findings_collector.py --afl-out afl_out -d artifacts/fuzz-findings --minimize --target-bin build-afl/fuzz_secure_ops_afl || true
      - name: Upload findings artifact
        uses: actions/upload-artifact@v4
        with:
          name: afl-findings
          path: artifacts/fuzz-findings
