name: "Security: Secret Scanning (gitleaks)"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-repo scan every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # For uploading SARIF results

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for accurate scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: true # Comment on PR if leaks found
        with:
          args: detect --verbose --source . --log-opts="--all"

      - name: Upload SARIF report
        if: failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks
