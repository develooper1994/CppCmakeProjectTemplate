name: AFL Long Run

on:
  schedule:
    - cron: '0 3 * * *' # nightly at 03:00 UTC
  workflow_dispatch:

jobs:
  build-and-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TARGET: secure_ops
      ARTIFACT_CORPUS_NAME: afl-seed-corpus
      ARTIFACT_FINDINGS_NAME: afl-findings
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build unzip zip python3 python3-venv afl++

      - name: Download previous seed corpus (best-effort)
        run: |
          python3 scripts/ci/afl_corpus_manager.py --token "${{ secrets.GITHUB_TOKEN }}" --artifact-name "${{ env.ARTIFACT_CORPUS_NAME }}" --output tests/fuzz/corpus/${{ env.TARGET }} || true

      - name: Configure with AFL compilers
        run: |
          export CC=afl-clang-fast
          export CXX=afl-clang-fast++
          cmake -S . -B build-afl -DENABLE_FUZZING=ON -DENABLE_AFL=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build fuzz target
        run: |
          cmake --build build-afl --target fuzz_${{ env.TARGET }} -- -j

      - name: Run AFL fuzzer (short smoke-run)
        run: |
          mkdir -p afl_out
          # run a bounded fuzz job (adjust timeout for longer runs in nightly settings)
          timeout 3600s afl-fuzz -i tests/fuzz/corpus/${{ env.TARGET }} -o afl_out -- ./build-afl/fuzz_${{ env.TARGET }} @@ || true

      - name: Collect findings
        run: |
          python3 scripts/ci/afl_collect_findings.py --input afl_out --output findings.zip || true

      - name: Upload findings artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_FINDINGS_NAME }}-${{ github.run_id }}
          path: findings.zip

      - name: Upload updated seed corpus
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_CORPUS_NAME }}
          path: tests/fuzz/corpus/${{ env.TARGET }}
name: AFL Long-Run Fuzz (nightly)

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch:

jobs:
  afl_long_run:
    name: AFL Long-Run (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AFL++
        run: |
          sudo apt-get update
          sudo apt-get install -y afl++

      - name: Configure build (AFL)
        env:
          CC: afl-clang-fast
          CXX: afl-clang-fast++
        run: |
          cmake -S . -B build-afl -DENABLE_FUZZING=ON -DENABLE_AFL=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build AFL targets
        run: |
          cmake --build build-afl --target fuzz_secure_ops_afl -- -j || true

      - name: Prepare output dir
        run: |
          mkdir -p afl_out || true

      - name: Run afl-fuzz (sample long-run)
        run: |
          # Run afl-fuzz with seed corpus and save findings
          if [ -x build-afl/fuzz_secure_ops_afl ]; then
            timeout 1800s afl-fuzz -i tests/fuzz/corpus/secure_ops -o afl_out -m none -t 300 -- ./build-afl/fuzz_secure_ops_afl @@ || true
          else
            echo "AFL target not found; skipping run"
          fi

      - name: Upload AFL findings
        uses: actions/upload-artifact@v4
        with:
          name: afl-findings-$(date +%F)
          path: afl_out
