name: Reusable CI
on:
  workflow_call:
    inputs:
      cmake_args:
        required: false
        type: string
      enable_fuzz:
        required: false
        type: boolean
      build_type:
        required: false
        type: string

jobs:
  build_and_optional_fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dev dependencies (best-effort)
        run: |
          python3 -m pip install --upgrade pip || true
          if [ -f requirements-dev.txt ]; then python3 -m pip install -r requirements-dev.txt || true; fi

      - name: Configure CMake
        id: cmake_cfg
        run: |
          cmake_args="${{ inputs.cmake_args }}"
          if [ -n "${{ inputs.build_type }}" ]; then
            cmake_args="$cmake_args -DCMAKE_BUILD_TYPE=${{ inputs.build_type }}"
          fi
          cmake -S . -B build $cmake_args

      - name: Build
        id: build
        run: cmake --build build -- -j

      - name: "Optional: short fuzz smoke-run"
        if: ${{ inputs.enable_fuzz == 'true' || inputs.enable_fuzz == true }}
        run: |
          for bin in build/fuzz_*; do
            if [ -x "$bin" ]; then
              echo "Running smoke: $bin"
              timeout 30s "$bin" -runs=100 -max_total_time=10 || true
            fi
          done
