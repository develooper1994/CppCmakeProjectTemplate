name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build g++-13

    - name: Cache GTest
      uses: actions/cache@v4
      with:
        path: build/gcc-debug-static-x86_64/_deps
        key: gtest-${{ runner.os }}-gcc-${{ hashFiles('tests/CMakeLists.txt') }}
        restore-keys: gtest-${{ runner.os }}-gcc-

    - name: Configure and Build (Static)
      run: |
        cmake --preset gcc-debug-static-x86_64
        cmake --build --preset gcc-debug-static-x86_64

    - name: Run Tests
      run: |
        ctest --preset gcc-debug-static-x86_64

  build-linux-clang:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build clang

    - name: Cache GTest
      uses: actions/cache@v4
      with:
        path: build/clang-debug-static-x86_64/_deps
        key: gtest-${{ runner.os }}-clang-${{ hashFiles('tests/CMakeLists.txt') }}
        restore-keys: gtest-${{ runner.os }}-clang-

    - name: Configure and Build (Clang Static)
      run: |
        cmake --preset clang-debug-static-x86_64
        cmake --build --preset clang-debug-static-x86_64

    - name: Run Tests
      run: |
        ctest --preset clang-debug-static-x86_64

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache GTest
      uses: actions/cache@v4
      with:
        path: build/msvc-debug-static-x64/_deps
        key: gtest-${{ runner.os }}-msvc-${{ hashFiles('tests/CMakeLists.txt') }}
        restore-keys: gtest-${{ runner.os }}-msvc-

    - name: Configure and Build (Static)
      run: |
        cmake --preset msvc-debug-static-x64
        cmake --build --preset msvc-debug-static-x64

    - name: Run Tests
      run: |
        ctest --preset msvc-debug-static-x64

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: brew install ninja cmake

    - name: Cache GTest
      uses: actions/cache@v4
      with:
        path: build/clang-debug-static-x86_64/_deps
        key: gtest-${{ runner.os }}-${{ hashFiles('tests/CMakeLists.txt') }}
        restore-keys: gtest-${{ runner.os }}-

    - name: Configure and Build (AppleClang Static)
      run: |
        cmake --preset clang-debug-static-x86_64
        cmake --build --preset clang-debug-static-x86_64

    - name: Run Tests
      run: |
        ctest --preset clang-debug-static-x86_64
