name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Python tests
        run: python3 -m pytest -q

      - name: Template smoke-run (dry-run)
        run: |
          # Ensure templates can be rendered in dry-run mode
          python3 scripts/tool.py --dry-run lib add toy --template singleton

  detect-changes:
    name: Detect C/C++ Changes
    runs-on: ubuntu-latest
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cpp:
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - 'cmake/**'
              - 'libs/**'
              - 'apps/**'
              - 'include/**'
              - 'src/**'
              - '**/*.c'
              - '**/*.cpp'
              - '**/*.cxx'
              - '**/*.h'
              - '**/*.hpp'
              - 'vcpkg.json'
              - 'conanfile.py'

  cpp-build:
    name: C/C++ Build & Tests (Full Verification)
    needs: [python-tests, detect-changes]
    if: needs.detect-changes.outputs.cpp == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config python3-venv ccache

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt', 'CMakePresets.json', 'libs/**', 'apps/**', 'cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Build and run C++ tests + verification
        env:
          CCACHE_DIR: ~/.ccache
          CCACHE_MAXSIZE: 1G
        run: |
          python3 scripts/tool.py build check --no-sync

  # ── Linux / GCC ─────────────────────────────────────────────────────────────
  build-linux-gcc:
    needs: [python-tests, detect-changes]
    if: needs.detect-changes.outputs.cpp == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [gcc-debug-static-x86_64, gcc-release-static-x86_64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++-13

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  # ── Linux / Clang ────────────────────────────────────────────────────────────
  build-linux-clang:
    needs: [python-tests, detect-changes]
    if: needs.detect-changes.outputs.cpp == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [clang-debug-static-x86_64, clang-release-static-x86_64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  # ── Windows / MSVC ───────────────────────────────────────────────────────────
  build-windows:
    needs: [python-tests, detect-changes]
    if: needs.detect-changes.outputs.cpp == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: msvc-debug-static-x64
            config: Debug
          - preset: msvc-release-static-x64
            config: Release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --config ${{ matrix.config }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  # ── macOS / AppleClang ───────────────────────────────────────────────────────
  build-macos:
    needs: [python-tests, detect-changes]
    if: needs.detect-changes.outputs.cpp == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: brew install ninja cmake

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/clang-debug-static-x86_64/_deps
          key: deps-${{ runner.os }}-clang-debug-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-clang-debug-

      - name: Configure
        run: cmake --preset clang-debug-static-x86_64

      - name: Build
        run: cmake --build --preset clang-debug-static-x86_64

      - name: Test
        run: ctest --preset clang-debug-static-x86_64
