name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build g++-13

    - name: Configure and Build (Static)
      run: |
        cmake --preset gcc-debug-static-x86_64
        cmake --build --preset gcc-debug-static-x86_64

    - name: Run Tests
      run: |
        ctest --preset gcc-debug-static-x86_64

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure and Build (Static)
      run: |
        cmake --preset msvc-debug-static-x64
        cmake --build --preset msvc-debug-static-x64

    - name: Run Tests
      run: |
        ctest --preset msvc-debug-static-x64
