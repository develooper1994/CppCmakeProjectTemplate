name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Linux / GCC ─────────────────────────────────────────────────────────────
  build-linux-gcc:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [gcc-debug-static-x86_64, gcc-release-static-x86_64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++-13

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

  # ── Linux / Clang ────────────────────────────────────────────────────────────
  build-linux-clang:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [clang-debug-static-x86_64, clang-release-static-x86_64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

  # ── Windows / MSVC ───────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [msvc-debug-static-x64, msvc-release-static-x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

  # ── macOS / AppleClang ───────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install ninja cmake

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/clang-debug-static-x86_64/_deps
          key: deps-${{ runner.os }}-clang-debug-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-clang-debug-

      - name: Configure
        run: cmake --preset clang-debug-static-x86_64

      - name: Build
        run: cmake --build --preset clang-debug-static-x86_64

      - name: Test
        run: ctest --test-dir build/clang-debug-static-x86_64 --output-on-failure
