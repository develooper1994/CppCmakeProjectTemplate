name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-dev.txt') }}

      - name: Install Python dev dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Python tests
        run: python3 -m pytest -q

  detect-changes:
    name: Detect C/C++ Changes
    runs-on: ubuntu-latest
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cpp:
              - 'CMakeLists.txt'
              - 'libs/**'
              - 'apps/**'
              - 'cmake/**'
              - 'src/**'

  cpp-build:
    name: C/C++ Build & Tests
    needs: [python-tests, detect-changes]
    if: needs.detect-changes.outputs.cpp == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config python3-venv python3-distutils ccache

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-dev.txt') }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Build and run C++ tests + extension
        env:
          CCACHE_DIR: ${{ runner.temp }}/ccache
          CCACHE_MAXSIZE: 1G
        run: |
          python3 scripts/tool.py build check
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Linux / GCC ─────────────────────────────────────────────────────────────
  build-linux-gcc:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [gcc-debug-static-x86_64, gcc-release-static-x86_64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0        # full history for git describe

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++-13

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  # ── Linux / Clang ────────────────────────────────────────────────────────────
  build-linux-clang:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [clang-debug-static-x86_64, clang-release-static-x86_64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  # ── Windows / MSVC ───────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: msvc-debug-static-x64
            config: Debug
          - preset: msvc-release-static-x64
            config: Release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --config ${{ matrix.config }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  # ── macOS / AppleClang ───────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: brew install ninja cmake

      - name: Cache _deps
        uses: actions/cache@v4
        with:
          path: build/clang-debug-static-x86_64/_deps
          key: deps-${{ runner.os }}-clang-debug-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-clang-debug-

      - name: Configure
        run: cmake --preset clang-debug-static-x86_64

      - name: Build
        run: cmake --build --preset clang-debug-static-x86_64

      - name: Test
        run: ctest --preset clang-debug-static-x86_64
