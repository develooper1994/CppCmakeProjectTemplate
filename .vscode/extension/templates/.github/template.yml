name: C++ CMake Project Template
description: "A production-ready, multi-target C++ project boilerplate."

post_generate_message: |
  # Project Initialized!
  
  Your new project is ready. To get started:
  
  1. Rename the project:
     `python3 scripts/init_project.py --name MyNewApp`
  
  2. Setup quality guards:
     `python3 scripts/setup_hooks.py`
  
  3. Build your project:
     `python3 scripts/build.py`
