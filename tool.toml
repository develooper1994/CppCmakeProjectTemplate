# tool.toml — CppCmakeProjectTemplate Central Configuration
#
# This file provides project-wide defaults for all `tool` commands.
# CLI flags always override values here. Environment variables override too.
#
# Sections mirror the tool command structure:
#   [tool]       — global dispatcher defaults
#   [build]      — `tool build` defaults
#   [perf]       — `tool perf` defaults
#   [security]   — `tool security` defaults
#   [lib]        — `tool lib` defaults
#   [doc]        — `tool doc` defaults
#   [release]    — `tool release` defaults
#   [hooks]      — pre-commit / git hooks
#   [embedded]   — cross-compilation / embedded target defaults

# ---------------------------------------------------------------------------
# [tool] — Global dispatcher defaults
# ---------------------------------------------------------------------------
[tool]
# Default preset used when none is specified on CLI or in session.
default_preset = "gcc-debug-static-x86_64"

# Default build profile: normal | strict | hardened | extreme
default_profile = "normal"

# Structured log format: text | json
log_format = "text"

# Automatically confirm non-destructive operations (equivalent to --yes)
auto_confirm = false

# ---------------------------------------------------------------------------
# [build] — `tool build` defaults
# ---------------------------------------------------------------------------
[build]
# Preset to use when --preset is not given on CLI
preset = "gcc-debug-static-x86_64"

# LTO disabled by default (enabled for release profiles)
lto = false

# Compiler cache: ccache | sccache | "" (auto-detected)
cache_program = ""

# Extra CMake definitions appended to every configure run
# Specified as a list of "KEY=VALUE" strings
extra_cmake_args = []

# Default parallel jobs (0 = auto-detect from CPU count)
parallel_jobs = 0

# ---------------------------------------------------------------------------
# [perf] — `tool perf` defaults
# ---------------------------------------------------------------------------
[perf]
# Budget thresholds for `tool perf check-budget`
size_threshold_pct  = 10.0   # Max allowed binary size growth (%)
time_threshold_pct  = 20.0   # Max allowed build time growth (%)

# Auto-detect build directory (most recently modified preset dir)
auto_detect_build_dir = true

# Save bench results as baseline automatically after each `perf bench` run
bench_auto_baseline = false

# ---------------------------------------------------------------------------
# [security] — `tool security` defaults
# ---------------------------------------------------------------------------
[security]
# Minimum severity that causes a non-zero exit: CRITICAL | HIGH | MEDIUM | LOW | NONE
fail_on_severity = "HIGH"

# Output format: text | json
format = "text"

# Paths to suppression files (cppcheck / clang-tidy)
# suppressions = ["cmake/suppressions.txt"]
suppressions = []

# ---------------------------------------------------------------------------
# [lib] — `tool lib` defaults
# ---------------------------------------------------------------------------
[lib]
# Default C++ standard for newly created libraries
cxx_standard = "17"

# Default template used by `tool lib add`
default_template = "normal"

# Auto-register exported libraries in the root CMakeLists.txt
auto_register = true

# ---------------------------------------------------------------------------
# [doc] — `tool doc` defaults
# ---------------------------------------------------------------------------
[doc]
# Port used by `tool doc serve`
serve_port = 8080

# Automatically open browser when starting the doc server
serve_open_browser = false

# ---------------------------------------------------------------------------
# [release] — `tool release` defaults
# ---------------------------------------------------------------------------
[release]
# Auto-push tag after `tool release tag`
auto_push = false

# GPG signing key (fingerprint or email). Empty = no signing.
# signing_key = "maintainer@example.com"
signing_key = ""

# Files synchronized when version is bumped
version_files = [
    "VERSION",
    "pyproject.toml",
    "extension/package.json",
    "CMakeLists.txt",
]

# ---------------------------------------------------------------------------
# [hooks] — pre-commit / git hooks
# ---------------------------------------------------------------------------
[hooks]
# gitleaks configuration file (relative to project root)
gitleaks_config = ".gitleaks.toml"

# Run gitleaks on commit (disable only if you have a slower CI gate)
gitleaks_on_commit = true

# clang-format on staged C++ files
clangformat_on_commit = true

# ---------------------------------------------------------------------------
# [presets] — CMakePresets.json generator defaults (`tool presets generate`)
# ---------------------------------------------------------------------------
[presets]
# Compilers included in the generated preset matrix.
# Supported values: gcc | clang | cuda | msvc
compilers   = ["gcc", "clang"]

# Build types (maps to CMAKE_BUILD_TYPE).
# Supported values: debug | release | relwithdebinfo | minsizerel
build_types = ["debug", "release", "relwithdebinfo"]

# Linkage variants.
# Supported values: static | dynamic
linkages    = ["static", "dynamic"]

# Target architectures.
# Common values: x86_64 | x86 | aarch64 | armv7 | <free-string>
# Free-string arches must have a matching cmake/toolchains/<arch>.cmake file.
# Uncomment x86_64-linux-musl for fully static musl libc builds.
# Uncomment x86_64-linux-musl-zig for zig cc + musl (no separate toolchain needed).
# Uncomment arm64 for MSVC ARM64 builds (Windows on ARM).
# Uncomment embedded arches for bare-metal cross-compilation.
#
# Available toolchains (cmake/toolchains/):
#   Linux cross:  aarch64-linux-gnu, armv7-linux-gnueabihf, riscv64-linux-gnu,
#                 powerpc64le-linux-gnu, mipsel-linux-gnu, linux-x86
#   Windows:      x86_64-w64-mingw32 (MinGW-w64 from Linux)
#   musl static:  x86_64-linux-musl, aarch64-linux-musl
#   musl+zig:     x86_64-linux-musl-zig, aarch64-linux-musl-zig
#   Embedded:     arm-cortex-m0, arm-cortex-m7, arm-none-eabi
arches      = ["x86_64"]
# arches    = ["x86_64", "x86_64-linux-musl"]
# arches    = ["x86_64", "x86_64-linux-musl-zig"]
# arches    = ["x86_64", "arm64"]
# arches    = ["x86_64", "aarch64-linux-gnu", "armv7-linux-gnueabihf", "riscv64-linux-gnu"]
# arches    = ["x86_64", "x86_64-w64-mingw32"]
# arches    = ["x86_64", "aarch64-linux-musl", "aarch64-linux-musl-zig"]
# arches    = ["x86_64", "arm-cortex-m0", "arm-cortex-m7"]

# CMake minimum version required in the generated file.
cmake_minimum_major = 3
cmake_minimum_minor = 25

# Preset selected when neither --preset nor a session preset is set.
default_preset = "gcc-debug-static-x86_64"

# CUDA GPU architecture spec written into cuda-* presets.
# Supported values: native | all-major | 75;86;89 | <explicit SM list>
cuda_architectures = "native"

# Generator used in generated configurePresets (empty = system default, i.e. Ninja)
generator = "Ninja"

# Constraint matrix: combinations to skip (emit a warning, not a fatal error).
# Format: list of "compiler-buildtype-linkage-arch" glob patterns.
# Wildcards: * (any segment)
skip_combinations = [
    "cuda-*-dynamic-*",          # CUDA forces static linkage
    "*-*-dynamic-*musl*",        # musl targets are static-only
    "clang-*-*-*zig*",           # zig toolchain provides its own compiler
    "gcc-*-*-arm64",             # arm64 is MSVC-only (Windows on ARM)
    "clang-*-*-arm64",           # arm64 is MSVC-only (Windows on ARM)
    "clang-*-*-arm-none-*",      # embedded targets require gcc (arm-none-eabi-gcc)
    "clang-*-*-arm-cortex-*",    # embedded targets require gcc (arm-none-eabi-gcc)
    "msvc-*-*-arm-none-*",       # embedded targets are not MSVC-compatible
    "msvc-*-*-arm-cortex-*",     # embedded targets are not MSVC-compatible
    "cuda-*-*-arm-none-*",       # embedded targets are not CUDA-compatible
    "cuda-*-*-arm-cortex-*",     # embedded targets are not CUDA-compatible
    "*-*-dynamic-arm-none-*",    # embedded targets are bare-metal (static only)
    "*-*-dynamic-arm-cortex-*",  # embedded targets are bare-metal (static only)
    "clang-*-*-*mingw*",         # MinGW only supports gcc
    "cuda-*-*-*mingw*",          # CUDA does not support MinGW cross-compilation
]

# ---------------------------------------------------------------------------
# [autotuner] — `tool perf autotune` compiler-flag search space
# ---------------------------------------------------------------------------
[autotuner]
# Default strategy: hill | grid | random | anneal
strategy = "hill"

# Default optimisation oracle: speed | size | instructions
oracle = "speed"

# Maximum number of build+run trials before stopping
rounds = 16

# Simulated annealing parameters (used when strategy = "anneal")
T_init  = 1.0   # Initial temperature
T_alpha = 0.92  # Cooling rate (0 < α < 1)

# Flag candidates for speed / instructions oracles.
# Each inner list is a *group* — exactly one flag from each group is active.
# Use "" (empty string) for "no flag" (baseline).
flag_candidates = [
    ["-O2", "-O3"],
    ["-march=x86-64", "-march=native"],
    ["", "-funroll-loops"],
    ["", "-fomit-frame-pointer"],
]

# Flag candidates used when oracle = "size".
# Prefer size-shrinking flags: -Os / -Oz over -O3.
size_flag_candidates = [
    ["-Os", "-Oz", "-O2", "-O3"],
    ["-march=x86-64", "-march=native"],
    ["", "-ffunction-sections -fdata-sections"],
    ["", "-flto"],
    ["", "-fno-exceptions"],
]

# ---------------------------------------------------------------------------
# [embedded] — cross-compilation / embedded defaults
# ---------------------------------------------------------------------------
[embedded]
# Default embedded preset (used by `tool build --embedded`)
default_preset = "embedded-cortex-m4"

# Tool prefix for bare-metal toolchains
arm_toolchain_prefix = "arm-none-eabi-"

# Path to linker scripts directory (relative to project root)
linker_scripts_dir = "cmake/linker_scripts"
